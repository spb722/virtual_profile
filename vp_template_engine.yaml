# =============================================================================
# TEMPLATE SELECTION DECISION TREE
# Quick reference for the template engine routing logic
# =============================================================================

routing_guide:
  - condition: "VP name contains Rolling_W{N}"
    template: track_1.rolling_week
    note: "Use week_offsets lookup for start/end day values"

  - condition: "VP name starts with M{N}_ (M1, M2 ... M12)"
    template: track_1.fixed_month
    note: "N = month offset from CurrentMonth"

  - condition: "VP name starts with MTD_"
    template: track_1.mtd_lmtd
    variant: template_mtd

  - condition: "VP name starts with LMTD_"
    template: track_1.mtd_lmtd
    variant: template_lmtd

  - condition: "VP name contains Last{N}Days or SUM_{N}_DAYS or AVG_..._LAST{N}MONTHS"
    template: track_1.last_n
    note: "Use template_months_avg if VP name contains AVG and time unit is MONTHS"

  - condition: "VP name contains PCT_DROP"
    template: track_4.pct_drop
    note: "Composite — resolve both operand VPs first"

  - condition: "VP name contains _percent_ or ratio"
    template: track_4.ratio
    note: "Composite — resolve numerator and denominator VPs"

  - condition: "VP name contains SUBSCRIBED or NON_SUBSCRIBED or CHECK_{N}_DAYS_SUBSCRIPTION"
    template: track_2.subscription

  - condition: "VP name contains SEGMENT, FLAG, STATUS, WHITELIST, NBO, MIGRATION"
    template: track_2.flag_check

  - condition: "VP name contains LATEST_ID or MAX_ID or SNAPSHOT"
    template: track_3.snapshot_id

  - condition: "VP name contains GEO_LOCATION"
    template: track_3.geo_location

  - condition: "VP name contains ${X} or ${NoOfDays} and NO action type"
    template: track_5.dynamic_window

  - condition: "VP name contains ${X} or ${NoOfDays} and HAS action type (BONUS/PROMO)"
    template: track_5.campaign_check
